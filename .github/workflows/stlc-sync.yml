name: Sync SDK repos

# Keeps staging and production trunks in sync. The back-sync job pulls
# production main (version/changelog commits from releases) back onto staging
# so the next stlc build starts from the correct base.
# Built from: https://github.com/stainless/stlc/tree/main/examples/sdk-repo
on:
  schedule:
    # Poll twice hourly — catches release commits within 30 min
    - cron: '7,37 * * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [prod-released]

jobs:
  back-sync:
    runs-on: ubuntu-latest
    if: github.repository == 'Metronome-Industries/metronome-ruby-staging'
    permissions:
      contents: write
    concurrency:
      group: stlc-back-sync
      cancel-in-progress: true
    env:
      PRODUCTION_REPO: Metronome-Industries/metronome-ruby
    steps:
      - name: Check out staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch production main
        run: |
          # Production repos are public — no token needed for read
          git remote add production "https://github.com/${PRODUCTION_REPO}.git"
          git -c "http.https://github.com/.extraheader=" fetch production main

      - name: Check whether production has content staging lacks
        id: diff
        run: |
          MERGED=$(git merge-tree --write-tree origin/main production/main) || MERGED=conflict
          STAGING_TREE=$(git rev-parse 'origin/main^{tree}')
          if [ "$MERGED" = "$STAGING_TREE" ]; then
            echo "Staging already has production's content. Nothing to pull back."
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync production to staging (fast-forward)
        if: steps.diff.outputs.behind == 'true'
        run: |
          if ! git merge-base --is-ancestor origin/main production/main; then
            echo "::error title=Back-sync blocked::staging main is not an ancestor of production/main. Trunks have diverged."
            exit 1
          fi
          git push origin production/main:refs/heads/main
          echo "Fast-forwarded staging/main to production/main."
